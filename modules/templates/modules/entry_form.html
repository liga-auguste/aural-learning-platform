{% extends "base.html" %}
{% block title %}Modul bearbeiten{% endblock %}
{% block content %}
  <h2>{{ view.object|default:"Neues Modul" }}</h2>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Speichern</button>
  </form>
  <a class="btn" href="{% url 'modules:entry_list' %}">Zurück</a>
{% endblock %}
