{% extends "base.html" %}
{% block title %}Modul löschen{% endblock %}
{% block content %}
  <h2>{{ object }} wirklich löschen?</h2>
  <form method="post">{% csrf_token %}
    <button type="submit">Ja, löschen</button>
    <a class="btn" href="{% url 'modules:entry_detail' object.pk %}">Abbrechen</a>
  </form>
{% endblock %}
